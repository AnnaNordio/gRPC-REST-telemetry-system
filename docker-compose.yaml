version: '3.8'

services:
  gateway:
    build:
      context: .
      target: gateway
    ports:
      - "50051:50051"
      - "8080:8080"
      - "3000:3000" 
    volumes:
      - ./results:/root/results
    networks:
      - telemetry-net

  # Servizio Sensore Standard: segue la configurazione remota all'infinito
  sensor:
    build:
      context: .
      target: sensor
    depends_on:
      - gateway
    environment:
      - APP_MODE=normal
      - GATEWAY_ADDR=gateway:50051
    networks:
      - telemetry-net

  # Servizio Benchmark: esegue la suite (Warm-up, Steady, Cool-down) e poi si arresta
  benchmark:
    build:
      context: .
      target: sensor
    depends_on:
      - gateway
    environment:
      - APP_MODE=benchmark
      - GATEWAY_ADDR=gateway:50051
    restart: "no"              
    networks:
      - telemetry-net

  envoy:
    image: envoyproxy/envoy:v1.22.0
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
    ports:
      - "8081:8081"
    networks:
      - telemetry-net

networks:
  telemetry-net:
    driver: bridge