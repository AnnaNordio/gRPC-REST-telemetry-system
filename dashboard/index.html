<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>IoT Telemetry Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; }
        .header { text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .value { font-size: 1.5rem; font-weight: bold; }
        .status-rest { color: #e74c3c; }
        .status-grpc { color: #2ecc71; }
        .chart-container { background: white; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="header">
    <h1>📡 Monitoraggio gRPC vs REST</h1>
</div>

<div class="grid">
    <div class="card">
        <h3>Latenza REST</h3>
        <div id="rest-lat" class="value status-rest">-- ms</div>
    </div>
    <div class="card">
        <h3>Latenza gRPC</h3>
        <div id="grpc-lat" class="value status-grpc">-- ms</div>
    </div>
</div>

<div class="chart-container">
    <canvas id="latencyChart"></canvas>
</div>

<script>
    const ctx = document.getElementById('latencyChart').getContext('2d');
    
    // Configurazione del grafico
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], // Qui andranno i timestamp
            datasets: [
                {
                    label: 'REST (µs)',
                    borderColor: '#e74c3c',
                    data: [],
                    borderWidth: 2,
                    pointRadius: 1, // Toglie i pallini per rendere la linea più pulita
                    fill: false,
                    tension: 0.4
                },
                {
                    label: 'gRPC (µs)',
                    borderColor: '#2ecc71',
                    data: [],
                    borderWidth: 2,
                    pointRadius: 1,
                    fill: false,
                    tension: 0.4
                }
            ]
        },
        options: {
            responsive: true,
            animation: false, // Disabilita animazioni per fluidità in tempo reale
            scales: {
                x: { title: { display: true, text: 'Tempo' } },
                y: { beginAtZero: true, title: { display: true, text: 'Latenza (ms)' } }
            }
        }
    });

    async function fetchData() {
        try {
            // Chiamata al tuo Gateway Go
            const response = await fetch('http://localhost:8080/results');
            const data = await response.json();
            
            if (!data || data.length === 0) return;

            // Filtriamo i dati per protocollo
            const restPoints = data.filter(d => d.protocol === 'REST');
            const grpcPoints = data.filter(d => d.protocol === 'gRPC');

            // Prendiamo gli ultimi 20-30 punti per non intasare il grafico
            const limit = 30;
            const recentRest = restPoints.slice(-limit);
            const recentGrpc = grpcPoints.slice(-limit);

            // Aggiornamento etichette (usiamo quelle di gRPC come riferimento temporale)
            chart.data.labels = recentGrpc.map(d => d.timestamp);
            
            // Aggiornamento dati delle linee
            chart.data.datasets[0].data = recentRest.map(d => d.latency_ms);
            chart.data.datasets[1].data = recentGrpc.map(d => d.latency_ms);

            console.log(recentGrpc);

            // Aggiornamento Card testuali (ultimo valore)
            if (recentRest.length > 0) 
                document.getElementById('rest-lat').innerText = recentRest[recentRest.length-1].latency_ms.toFixed(0) + " µs";
            if (recentGrpc.length > 0) 
                document.getElementById('grpc-lat').innerText = recentGrpc[recentGrpc.length-1].latency_ms.toFixed(0) + " µs";

            chart.update();

        } catch (err) {
            console.error("Errore nel recupero dati:", err);
        }
    }

    setInterval(fetchData, 1000);
</script>
</body>
</html>
