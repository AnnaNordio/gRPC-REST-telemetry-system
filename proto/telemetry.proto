syntax = "proto3";
package telemetry;

message SensorData {
    string sensor_id = 1;
    float temperature = 2;
    float humidity = 3;
    int64 timestamp = 4;
    double latency_rest = 5; 
    double latency_grpc = 6;
}

service TelemetryService {
  rpc SendData(SensorData) returns (Empty) {}
}

option go_package = "./proto";

message Empty {}