syntax = "proto3";
package telemetry;

message NestedDetail {
    string key = 1;
    string value = 2;
    map<string, string> metadata = 3;
}

message SensorData {
    string sensor_id = 1;
    float temperature = 2;
    float humidity = 3;
    int64 timestamp = 4;
    double latency_rest = 5; 
    double latency_grpc = 6;
    string payload_content = 7; 
    repeated NestedDetail details = 8;
    int64 payload_bytes = 9;
    int64 overhead_bytes = 10;
}

message GrpcStats {
    double avg_latency = 1;
    double p99_latency = 2;
    int64 timestamp = 3;
    double payload_size = 4; 
    double overhead = 5;     
}

message Empty {}

service TelemetryService {
  rpc SendData(SensorData) returns (Empty) {}
  rpc StreamData(stream SensorData) returns (Empty) {}
  rpc GetGrpcStream (Empty) returns (stream GrpcStats);
  rpc GetStats (Empty) returns (GrpcStats);
}

option go_package = "./proto";