syntax = "proto3";
package telemetry;

message NestedDetail {
    string key = 1;
    string value = 2;
    map<string, string> metadata = 3;
}

message SensorData {
    string sensor_id = 1;
    float temperature = 2;
    float humidity = 3;
    int64 timestamp = 4;
    repeated string tags = 5;                
    repeated NestedDetail details = 6;       
    map<string, float> readings_history = 7;
}

message GrpcStats {
    double avg_latency = 1;
    double p99_latency = 2;
    int64 timestamp = 3;
    int64 payload_size = 4; 
    int64 overhead = 5;    
    double jitter = 6; 
    double throughput = 7;
}

message Empty {}

service TelemetryService {
  rpc SendData(SensorData) returns (Empty) {}
  rpc StreamData(stream SensorData) returns (Empty) {}
  rpc GetGrpcStream (Empty) returns (stream GrpcStats);
  rpc GetStats (Empty) returns (GrpcStats);
}

option go_package = "./proto";